name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar tests con coverage
        run: npm run test:coverage

      - name: Publicar reporte de coverage en el PR
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          json-summary-path: ./coverage/coverage-summary.json

      - name: Generar badge de coverage
        uses: demosjarco/badge-generator@v1.4.1
        with:
          label: coverage
          path: ./coverage/coverage-summary.json
          output: ./badges/coverage.svg

      - name: Subir badge al repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: actualizar badge de coverage"
          file_pattern: badges/coverage.svg